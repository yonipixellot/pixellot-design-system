  primaryColor: '#1A3B8A',
  logoSize: 80,

  const hex = props.primaryColor!.replace('#', '')

  return \`rgb(\${r},\${g},\${b})\`
})

const heroStyle = computed(() => ({

  height: props.height + 'px',
  background: \`linear-gradient(180deg, \${props.primaryColor} 0%, \${darkerColor.value} 100%)\`,

  display: 'flex',

}))
