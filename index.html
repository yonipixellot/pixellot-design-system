/* ═══════════════════════════════════════════════════════ */
/* PIXELLOT DESIGN SYSTEM v2 — GLOBAL TOKENS              */
/* ═══════════════════════════════════════════════════════ */
:root {
  /* ─── SPACING (8px base grid) ─── */
  --space-1:   4px;
  --space-2:   8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ─── TYPOGRAPHY — Font Family ─── */
  --font-family-base: 'Red Hat Display', sans-serif;

  /* ─── TYPOGRAPHY — Font Sizes ─── */
  --text-2xs:  10px;
  --text-xs:   12px;
  --text-sm:   13px;
  --text-base: 14px;
  --text-md:   15px;
  --text-lg:   16px;
  --text-xl:   18px;
  --text-2xl:  20px;
  --text-3xl:  24px;
  --text-4xl:  28px;

  /* ─── TYPOGRAPHY — Font Weights ─── */
  --font-regular:   400;
  --font-medium:    500;
  --font-semibold:  600;
  --font-bold:      700;

  /* ─── TYPOGRAPHY — Line Heights ─── */
  --leading-tight:  1.2;
  --leading-normal: 1.5;

  /* ─── BORDER RADIUS ─── */
  --radius-xs:   3px;
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:  12px;
  --radius-xl:  16px;
  --radius-2xl: 20px;
  --radius-full: 50%;

  /* ─── ELEVATION / SHADOWS ─── */
  --shadow-sm:    0 2px 4px rgba(0,0,0,0.2);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:    0 4px 12px rgba(0,0,0,0.15);
  --shadow-xl:    0 4px 12px rgba(0,0,0,0.3);
  --shadow-focus: 0 0 0 2px rgba(17,109,255,0.25);

  /* ─── ACCESSIBILITY ─── */
  /* sr-only utility: use class="sr-only" for screen-reader-only text */
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* ─── DARK MODE — Missing Token Overrides ─── */
@media (prefers-color-scheme: dark) {
  :root {
    --color-accent:            #3B8BFF;
    --color-danger-red:        #F87171;
    --color-dark-text:         #E8E8E8;
    --color-free-badge-green:  #4ADE80;
    --color-gray-overlay:      rgba(255,255,255,0.08);
    --color-live-red:          #F87171;
    --color-notif-badge-red:   #F87171;
    --color-overlay:           rgba(0,0,0,0.85);
    --color-premium-active:    #B97D0C;
    --color-premium-amber:     #F59E0B;
    --color-primary-active:    #2563EB;
  }
}
[data-theme="dark"] {
    --color-accent:            #3B8BFF;
    --color-danger-red:        #F87171;
    --color-dark-text:         #E8E8E8;
    --color-free-badge-green:  #4ADE80;
    --color-gray-overlay:      rgba(255,255,255,0.08);
    --color-live-red:          #F87171;
    --color-notif-badge-red:   #F87171;
    --color-overlay:           rgba(0,0,0,0.85);
    --color-premium-active:    #B97D0C;
    --color-premium-amber:     #F59E0B;
    --color-primary-active:    #2563EB;
}
